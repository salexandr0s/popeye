name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip test suite (for re-runs after test-only fixes)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches input
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match input ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Run verification pipeline
        if: ${{ !inputs.skip_tests }}
        run: |
          pnpm lint
          pnpm typecheck
          pnpm verify:src-build-artifacts
          pnpm verify:generated-artifacts
          pnpm test
          pnpm security:secrets

      - name: Build all packages
        run: pnpm build

      - name: Build .pkg and tarball
        run: bash scripts/build-pkg.sh

      - name: Sign and notarize macOS artifacts
        run: bash scripts/sign-pkg.sh
        env:
          POPEYE_SIGNING_REQUIRED: 'true'
          POPEYE_APP_SIGN_IDENTITY: ${{ secrets.POPEYE_APP_SIGN_IDENTITY }}
          POPEYE_SIGN_IDENTITY: ${{ secrets.POPEYE_SIGN_IDENTITY }}
          POPEYE_APPLE_ID: ${{ secrets.POPEYE_APPLE_ID }}
          POPEYE_TEAM_ID: ${{ secrets.POPEYE_TEAM_ID }}
          POPEYE_APP_PASSWORD: ${{ secrets.POPEYE_APP_PASSWORD }}

      - name: Generate release notes
        run: bash scripts/generate-release-notes.sh

      - name: Generate artifact inventory
        run: bash scripts/artifact-inventory.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: popeye-${{ inputs.version }}-darwin-arm64
          path: |
            dist/pkg/popeye-${{ inputs.version }}-darwin-arm64.pkg
            dist/pkg/popeye-${{ inputs.version }}-darwin-arm64.tar.gz
            dist/pkg/CHECKSUMS.sha256
            dist/pkg/SIGNING-STATUS.md
            dist/pkg/RELEASE-NOTES.md
            dist/pkg/INVENTORY.md

      - name: Create GitHub release draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            --draft \
            --title "Popeye v$RELEASE_VERSION" \
            --notes-file dist/pkg/RELEASE-NOTES.md \
            "dist/pkg/popeye-${RELEASE_VERSION}-darwin-arm64.pkg" \
            "dist/pkg/popeye-${RELEASE_VERSION}-darwin-arm64.tar.gz" \
            dist/pkg/CHECKSUMS.sha256 \
            dist/pkg/SIGNING-STATUS.md \
            dist/pkg/INVENTORY.md
