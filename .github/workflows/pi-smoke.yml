name: pi-smoke

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      pi_repository:
        description: 'owner/repo for the Pi checkout'
        required: true
        type: string
      pi_ref:
        description: 'Pi ref, tag, or branch'
        required: false
        default: 'main'
        type: string
      pi_smoke_command:
        description: 'Command to launch the Pi child process'
        required: false
        default: 'node'
        type: string
      pi_smoke_args_json:
        description: 'JSON array of args for the Pi smoke command'
        required: false
        default: '[]'
        type: string

env:
  PI_REPO: ${{ inputs.pi_repository || vars.PI_REPOSITORY || '' }}
  PI_REF: ${{ inputs.pi_ref || 'main' }}
  PI_COMMAND: ${{ inputs.pi_smoke_command || 'node' }}
  PI_ARGS: ${{ inputs.pi_smoke_args_json || '[]' }}

jobs:
  smoke:
    if: ${{ inputs.pi_repository != '' || vars.PI_REPOSITORY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.PI_REPO }}
          ref: ${{ env.PI_REF }}
          path: external-pi
          token: ${{ secrets.PI_CHECKOUT_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm ci
        working-directory: external-pi
      - run: npm run build
        working-directory: external-pi
      - run: pnpm verify:pi-checkout -- --pi-path "${{ github.workspace }}/external-pi" --command "${{ env.PI_COMMAND }}" --args-json '${{ env.PI_ARGS }}'
      - run: pnpm typecheck
      - run: pnpm test:pi-smoke
        env:
          POPEYE_ENABLE_PI_SMOKE: '1'
          POPEYE_PI_SMOKE_PATH: ${{ github.workspace }}/external-pi
          POPEYE_PI_SMOKE_COMMAND: ${{ env.PI_COMMAND }}
          POPEYE_PI_SMOKE_ARGS: ${{ env.PI_ARGS }}
