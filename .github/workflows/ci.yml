name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm verify:pi-boundary
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm security:secrets
      - run: pnpm security:sast
      - run: pnpm security:deps
      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json --omit dev
        continue-on-error: true
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
