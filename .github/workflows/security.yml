name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep
      - name: Run Semgrep
        run: semgrep scan --config p/owasp-top-ten --config p/typescript --config p/secrets --error --metrics=off
